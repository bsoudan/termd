# nxterm configuration
# Place at ~/.config/nxterm/config.toml
#
# If this file does not exist, nxterm falls back to the first listen
# address from ~/.config/nxtermd/server.toml (if present).

# Server address (same as --socket flag)
# connect = "unix:/tmp/nxtermd.sock"
# connect = "tcp:myserver:9090"
# connect = "ssh://user@myserver:2222"

# Command to run in new regions
# command = "bash"

# Enable debug logging
# debug = false
