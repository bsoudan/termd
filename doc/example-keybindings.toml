# "switch-session 3" = "ctrl+f3"
# "switch-session 4" = "ctrl+f4"
# "switch-session 5" = "ctrl+f5"
# "switch-session 6" = "ctrl+f6"
# "switch-session 7" = "ctrl+f7"
# "switch-session 8" = "ctrl+f8"
# "switch-session 9" = "ctrl+f9"

