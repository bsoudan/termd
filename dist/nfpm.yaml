name: nxtermd
arch: ${GOARCH}
platform: linux
version: ${VERSION}
release: 1${DIST}
description: Terminal multiplexer with client-server architecture
maintainer: nxtermd maintainers
license: MIT
contents:
  - src: nxtermd
    dst: /usr/bin/nxtermd
  - src: nxterm
    dst: /usr/bin/nxterm
  - src: nxtermctl
    dst: /usr/bin/nxtermctl
  - src: nxtermd.service
    dst: /usr/lib/systemd/user/nxtermd.service
    type: config
