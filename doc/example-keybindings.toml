# nxterm keybindings configuration
# Place this file at ~/.config/nxterm/keybindings.toml
#
# style sets the base keybinding preset. All bindings below override the preset.
# Options: "native" (default), "tmux", "screen", "zellij"
style = "native"

# prefix overrides the chord prefix key (default depends on style).
# native/tmux: "ctrl+b", screen: "ctrl+a"
# prefix = "ctrl+a"

# Bindings are organized by category: [main], [session], [tab].
# Each entry maps a command to a key or list of keys.
#
# Key formats:
#   "d"       - chord binding (press after prefix key)
#   "alt+."   - always-active binding (no prefix needed)
#   "alt+f1"  - Alt+function key (always-active)
#   "ctrl+f1" - Ctrl+function key (always-active)
#   "ctrl+."  - Ctrl+punctuation (always-active, requires kitty keyboard protocol)
#
# Multiple bindings:
#   next-tab = ["alt+.", "n"]   # both alt+. and prefix+n trigger next-tab
#
# Unbind a command:
#   close-tab = ""              # removes all bindings for close-tab
#
# Commands with arguments:
#   "switch-tab 1" = "1"       # prefix+1 switches to tab 1

# ── Main ─────────────────────────────────────────────────────────────

[main]
# detach = "d"
# send-prefix = "ctrl+b"
# show-help = "?"
# show-log = "l"
# show-status = "s"
# show-release-notes = "n"
# enter-scrollback = "["
# refresh-screen = "r"

# ── Session management ───────────────────────────────────────────────

[session]
# open-session = "S"
